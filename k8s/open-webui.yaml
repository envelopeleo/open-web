# Open WebUI：對話介面。需要持久卷存對話歷史。
# ── PVC：唯一有狀態的部分 ──
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: open-webui-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            # 連叢集內的 litellm Service（用 Service 名稱當主機名）
            - name: OPENAI_API_BASE_URL
              value: "http://litellm:4000/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arch2-secrets
                  key: LITELLM_MASTER_KEY
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: arch2-secrets
                  key: WEBUI_SECRET_KEY
            - name: ENABLE_OLLAMA_API
              value: "false"
            - name: DEFAULT_USER_ROLE
              value: "admin"
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui
spec:
  type: ClusterIP
  selector:
    app: open-webui
  ports:
    - port: 8080
      targetPort: 8080
