# LiteLLM：翻譯層。內部用，不對外。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - containerPort: 4000
          env:
            # 從 Secret 取金鑰，注入成環境變數
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: arch2-secrets
                  key: ANTHROPIC_API_KEY
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: arch2-secrets
                  key: LITELLM_MASTER_KEY
          volumeMounts:
            # 把 ConfigMap 掛成 /app/config.yaml
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
spec:
  # ClusterIP = 只在叢集內部可見（open-webui 連得到，外面連不到）
  type: ClusterIP
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
