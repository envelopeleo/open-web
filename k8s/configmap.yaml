# ConfigMap：把 litellm_config.yaml 的內容放進 k8s。
# 等同 compose 裡的 volume 掛載設定檔，但設定與映像解耦。
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      - model_name: claude-opus-4-8
        litellm_params:
          model: anthropic/claude-opus-4-8
          api_key: os.environ/ANTHROPIC_API_KEY
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY

    litellm_settings:
      drop_params: true

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
